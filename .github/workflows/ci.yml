name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  check:
    name: TypeScript Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download FFmpeg sidecar
        run: bash scripts/download-ffmpeg.sh x86_64-unknown-linux-gnu

      - name: Create frontendDist directory
        run: mkdir -p dist

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --all-features

  build:
    name: Build (${{ matrix.name }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, test-rust]
    permissions:
      contents: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            runner: windows-latest
            ffmpeg-target: x86_64-pc-windows-msvc
            tauri-args: ""

          - name: Linux x86_64
            runner: ubuntu-22.04
            ffmpeg-target: x86_64-unknown-linux-gnu
            tauri-args: ""

          - name: macOS ARM64
            runner: macos-latest
            ffmpeg-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin

          - name: macOS x86_64
            runner: macos-latest
            ffmpeg-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Download FFmpeg sidecar
        shell: bash
        run: bash scripts/download-ffmpeg.sh ${{ matrix.ffmpeg-target }}

      - name: Verify FFmpeg binaries
        shell: bash
        run: |
          echo "==> Checking FFmpeg binaries for ${{ matrix.ffmpeg-target }}"
          ls -lh src-tauri/binaries/ffmpeg-${{ matrix.ffmpeg-target }}* || { echo "ERROR: ffmpeg binary not found"; exit 1; }
          ls -lh src-tauri/binaries/ffprobe-${{ matrix.ffmpeg-target }}* || { echo "ERROR: ffprobe binary not found"; exit 1; }

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Kaast ${{ github.ref_name }}
          releaseBody: "See the assets below to download and install Kaast."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}
